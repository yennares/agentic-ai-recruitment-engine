<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HR Assist{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/x-icon">
</head>
<body>
  <div class="mobile-topbar">
    <button class="sidebar-toggle" aria-label="Toggle menu" onclick="document.body.classList.toggle('sidebar-open')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <span class="mobile-topbar-title">HR Assist</span>
  </div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="{{ url_for('static', filename='sitelogo.png') }}" alt="Site Logo">
        <span>HR Assist</span>
      </div>
      <nav>
        <ul>
          <li><a href="/" class="{{ 'active' if request.path == '/' }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"></path><path d="M5 9.5V21h14V9.5"></path><path d="M9 21v-6h6v6"></path></svg>
            <span>Home</span>
          </a></li>
          <li class="nav-section-label">AI Recruiting Pipeline</li>
          <li><a href="/pipeline" class="{{ 'active' if request.path == '/pipeline' }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"></rect><rect x="14" y="3" width="7" height="7" rx="1.5"></rect><rect x="3" y="14" width="7" height="7" rx="1.5"></rect><rect x="14" y="14" width="7" height="7" rx="1.5"></rect></svg>
            <span>Candidate Evaluation</span>
          </a></li>
          <li class="nav-section-label">Quick Tools</li>
          <li><a href="/jd" class="{{ 'active' if request.path == '/jd' }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="8" y1="13" x2="16" y2="13"></line><line x1="8" y1="17" x2="16" y2="17"></line></svg>
            <span>JD Creation</span>
          </a></li>
          <li><a href="/jdresume" class="{{ 'active' if request.path == '/jdresume' }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 3 4 4-4 4"></path><path d="M20 7H4"></path><path d="m8 21-4-4 4-4"></path><path d="M4 17h16"></path></svg>
            <span>JD-Resume Comparison</span>
          </a></li>
          <li><a href="/iqs" class="{{ 'active' if request.path == '/iqs' }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.1 9a3 3 0 0 1 5.82 1c0 2-3 2-3 4"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            <span>Interview Questions</span>
          </a></li>
          <li><a href="/email" class="{{ 'active' if request.path == '/email' }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m22 6-10 7L2 6"></path></svg>
            <span>Email Creation</span>
          </a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <span class="poc-badge">POC</span>
        <span>&copy; 2026 Raja Narravulla</span>
      </div>
    </aside>

    <div class="sidebar-backdrop" onclick="document.body.classList.remove('sidebar-open')"></div>

    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="loading">
    <img src="{{ url_for('static', filename='loading.gif')}}" alt="Loading">
  </div>

  <script>
    function showLoading() {
      document.getElementById("loading").style.display = "block";
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
